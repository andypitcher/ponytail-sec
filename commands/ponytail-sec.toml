description = "Security-hardening review: smallest change that breaks the attack chain"
prompt = "Run a butterfly-effect security pass over the current diff or repo. One line per finding: <file>:L<line>: <tag> <what>. <smallest fix>. Tags: harden (missing securityContext field, capability drop, readOnlyRootFilesystem, or non-root; name the exact field), dep (unneeded or unverified dependency; name the stdlib/platform replacement or the removal), rbac (over-broad permission such as verbs [\"*\"] or wildcard resources; name the narrowed set), inject (injection, unsafe deserialization, shell-exec, or unvalidated CRD field reaching a controller; name the safe primitive), secret (hardcoded secret or token in env/manifest; name the fix), expose (unnecessary network exposure, :latest image, debug endpoint, or privileged port; name the removal). Rank by attacker leverage removed per line changed. End with: kill-chain: <N> attack paths closed by <M>-line changes. If nothing to harden: 'Locked down already. Ship.'"
