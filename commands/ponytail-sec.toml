description = "Security-hardening review: smallest change that breaks the attack chain"
prompt = "Run a butterfly-effect security pass over the current diff or repo. One line per finding: <file>:L<line>: <tag> <what>. <smallest fix>. Tags: harden (missing securityContext/capability drop/readOnlyRootFilesystem/non-root, name the exact field), dep (unneeded or unverified dependency, name the stdlib replacement or removal), rbac (over-broad permission, name the narrowed verb/resource set), inject (injection/shell-exec/unsafe deserialization/unvalidated CRD field, name the safe primitive), secret (hardcoded secret or token, name the fix), expose (unnecessary exposure/:latest image/debug endpoint, name the removal). Rank by attacker leverage removed per line changed. End with: kill-chain: <N> attack paths closed by <M>-line changes. If nothing to harden: 'Locked down already. Ship.'"
