description = "Security-hardening review: code review, dependency assessment, hardening — smallest change that breaks the attack chain"
prompt = "Run three passes over the current diff or repo. Pass 1 — Code review: apply the ponytail lens (YAGNI, stdlib first, remove over refactor; dead code is security debt). Pass 2 — Dependency assessment: for each dep ask (a) does stdlib/platform do this? → remove; (b) solo maintainer, low OpenSSF Scorecard, or stale? → fork/vendor and flag the risk signal; (c) otherwise → keep but pin to digest or semver. Prefer: remove > stdlib > vendor > pin > keep. Pass 3 — Hardening: break the kill chain; rank findings by attacker leverage removed ÷ lines changed. One line per finding: <file>:L<line>: <tag> <what>. <smallest fix>. Tags: harden (missing securityContext field, capability drop, readOnlyRootFilesystem, or non-root; name the exact field), dep (unneeded or unverified dependency; name the replacement or removal and the risk signal), rbac (over-broad permission; name the narrowed set), inject (injection/shell-exec/unsafe deserialization; name the safe primitive and OWASP CWE), secret (hardcoded secret or token; name the fix), expose (unnecessary exposure, :latest image, debug endpoint; name the removal). Rank by attacker leverage removed per line changed. End with: kill-chain: <N> attack paths closed by <M>-line changes. If nothing to harden: 'Locked down already. Ship.' Then ask once: 'Apply fixes? (yes / no)'. If yes: for each finding, web-search the authoritative source (kubernetes.io for harden/rbac/expose, OWASP CWE page for inject, OpenSSF Scorecard or platform docs for dep/secret), cite the URL as [ref: <url>], and emit the minimal diff. Do not apply changes; present for review."
