description = "Full project security audit: code review, all dependencies assessed, all hardening findings with CVSS 4.0 scoring and blast-radius narrative"
prompt = "Run ponytail-sec-audit: three passes over the entire project. Pass 1 — Code review: does this code need to exist at all? YAGNI, stdlib first, remove over refactor. Pass 2 — Dependency assessment: web-search each dep's registry page and OpenSSF Scorecard; check last release date, contributor count, individual vs. org maintainer, SECURITY.md presence. Prefer remove > stdlib > vendor > pin > keep. Pass 3 — Hardening: all findings, CVSS 4.0 scored, stage order. Close with blast-radius narrative and a frank 'if I were you' prioritisation that may differ from score order. When asked about a finding by number: root cause + CVSS 4.0 vector + exploit scenario + delegate fix to ponytail."
