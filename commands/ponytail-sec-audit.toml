description = "Audit the whole repo for security attack surface, dependency risk, and hardening gaps"
prompt = "Run ponytail-sec-audit over the entire repository, not just the diff. Scan source files, dependency manifests, Dockerfiles, deployment manifests, config, and security-sensitive paths. Run three passes: 1) Code — code that should not exist, YAGNI, stdlib first, remove over refactor. 2) Dependencies — assess all dependencies with registry evidence and OpenSSF Scorecard where available. 3) Hardening — list all findings in kill-chain stage order with CVSS 4.0 score, blast-radius narrative, and frank 'if I were you' prioritisation. When asked to expand a finding by number, explain root cause, CVSS vector, exploit scenario, and delegate the fix to ponytail."
